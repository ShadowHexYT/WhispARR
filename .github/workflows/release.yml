name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            build_command: npx electron-builder --win nsis --publish never
            release_files: |
              release/*-windows-*.exe
              release/*-windows-*.exe.blockmap
              release/latest.yml
          - os: macos-latest
            label: macOS
            build_command: npx electron-builder --mac dmg --publish never
            release_files: |
              release/latest-mac.yml
              release/*-mac-*.dmg
              release/*-mac-*.dmg.blockmap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/write-release-notes.mjs "${{ github.ref_name }}" release-notes.txt

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release-notes.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Build release artifacts
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.release_files }}
          append_body: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
